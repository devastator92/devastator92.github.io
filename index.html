<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>DaYlo & Rexus</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #111111, #1a1a1a);
            color: #ffffff;
            font-family: Arial, Helvetica, sans-serif;
        }

        .container {
            text-align: center;
            max-width: 900px;
            padding: 20px;
        }

        h1 {
            font-size: 3.5rem;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        .image {
            width: 100%;
            max-width: 600px;
            border-radius: 15px;
            box-shadow: 0 0 25px rgba(0, 242, 254, 0.3);
            margin-bottom: 20px;
        }

        .heart {
            font-size: 2rem;
            color: #ff4d6d;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>DaYlo & Rexus</h1>

        <img src="imagen.png" alt="Daikeru Nylo Rexus" class="image">

        <div class="heart">❤️</div>
    </div>
</body>
</html>
