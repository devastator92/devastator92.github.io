<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Daikeru / Nylo & Rexus</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #111111;
            color: #ffffff;
            font-family: Arial, Helvetica, sans-serif;
        }

        .container {
            text-align: center;
        }

        h1 {
            font-size: 4rem;
            letter-spacing: 2px;
            margin: 0;
        }

        .heart {
            margin-top: 20px;
            font-size: 2rem;
            color: #ff4d6d;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Daikeru / Nylo & Rexus</h1>
        <div class="heart">❤️</div>
    </div>
</body>
</html>
